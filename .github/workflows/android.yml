name: Android — Build APK

on:
  push:
    tags:
      - 'v*.*.*'            # triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON: ${{ secrets.VITE_SUPABASE_ANON }}

      - name: Capacitor sync
        run: npx cap sync android

      - name: Reapply native manifest overrides
        run: cp android-overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' || github.event_name == 'workflow_dispatch' }}
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        
      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeLiftTogether-APK-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
